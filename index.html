<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Information System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Healthcare Information System</h1>

<h2>Add Patient</h2>
<input type="text" id="patientName" placeholder="Patient Name">
<input type="number" id="patientAge" placeholder="Patient Age">
<button onclick="addPatient()">Add Patient</button>

<h2>Schedule Appointment</h2>

<input type="text" id="apptPatient" placeholder="Patient Name">

<select id="apptMonth">
    <option value="">Month</option>
    <option value="01">January</option>
    <option value="02">February</option>
    <option value="03">March</option>
    <option value="04">April</option>
    <option value="05">May</option>
    <option value="06">June</option>
    <option value="07">July</option>
    <option value="08">August</option>
    <option value="09">September</option>
    <option value="10">October</option>
    <option value="11">November</option>
    <option value="12">December</option>
</select>

<select id="apptDay">
    <option value="">Day</option>
    <!-- 1–31 -->
    <script>
        for (let i = 1; i <= 31; i++) {
            document.write(`<option value="${i < 10 ? "0" + i : i}">${i}</option>`);
        }
    </script>
</select>

<select id="apptYear">
    <option value="">Year</option>
    <script>
        let currentYear = new Date().getFullYear();
        for (let i = currentYear; i <= currentYear + 5; i++) {
            document.write(`<option value="${i}">${i}</option>`);
        }
    </script>
</select>

<button onclick="addAppointment()">Add Appointment</button>

<h2>Patients</h2>
<ul id="patientList"></ul>

<h2>Appointments</h2>
<ul id="appointmentList"></ul>

<script src="script.js"></script>
</body>
</html>
